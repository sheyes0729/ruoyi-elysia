services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=ruoyi123
      - DB_NAME=ruoyi
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=ruoyi-elysia-production-secret
      - RATE_LIMIT_DURATION=60000
      - RATE_LIMIT_MAX=100
      - RATE_LIMIT_AUTH_MAX=10
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=ruoyi123
      - MYSQL_DATABASE=ruoyi
    volumes:
      - mysql_data:/var/lib/mysql
      - ./drizzle:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
