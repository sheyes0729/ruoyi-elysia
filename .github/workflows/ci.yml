name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run ESLint
        run: bun run lint
        working-directory: packages/backend

      - name: Run TypeScript type check
        run: bun run typecheck
        working-directory: packages/backend

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --expose=3306

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: packages/backend

      - name: Wait for MySQL and Redis
        run: |
          sleep 20
          bunx wait-on tcp:127.0.0.1:3306 tcp:127.0.0.1:6379 --timeout 120000

      - name: Create database and grant permissions
        run: |
          mysql -h 127.0.0.1 -u root -prootpassword -e "CREATE DATABASE IF NOT EXISTS ruoyi;"
          mysql -h 127.0.0.1 -u root -prootpassword -e "ALTER USER 'root'@'%' IDENTIFIED WITH mysql_native_password BY 'rootpassword'; FLUSH PRIVILEGES;"

      - name: Run database migrations
        run: bun run db:migrate
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: rootpassword
          DB_NAME: ruoyi
        working-directory: packages/backend

      - name: Clear and seed database
        run: |
          mysql -h 127.0.0.1 -u root -prootpassword ruoyi -e "SET FOREIGN_KEY_CHECKS = 0; TRUNCATE TABLE sys_user; TRUNCATE TABLE sys_role; TRUNCATE TABLE sys_user_role; TRUNCATE TABLE sys_menu; TRUNCATE TABLE sys_dept; TRUNCATE TABLE sys_post; TRUNCATE TABLE sys_dict_type; TRUNCATE TABLE sys_dict_data; TRUNCATE TABLE sys_config; TRUNCATE TABLE sys_notice; SET FOREIGN_KEY_CHECKS = 1;"
          bun run db:seed
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: rootpassword
          DB_NAME: ruoyi
        working-directory: packages/backend

      - name: Start server in background
        run: bun run start &
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: rootpassword
          DB_NAME: ruoyi
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          PORT: 4000
        working-directory: packages/backend

      - name: Wait for server to be ready
        run: |
          sleep 15
          bunx wait-on http://127.0.0.1:4000 --timeout 120000

      - name: Run tests
        run: bun test
        working-directory: packages/backend

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: packages/backend

      - name: Build application
        run: bun build src/index.ts --outdir=dist --target=bun
        working-directory: packages/backend

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/backend/dist/
